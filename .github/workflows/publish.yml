name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*' # Trigger automatically when you push a new version tag (e.g., v4.1.0)

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    
    # These permissions are required for PyPI Trusted Publishing (passwordless authentication)
    permissions:
      id-token: write 
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install build tools
      run: python -m pip install --upgrade pip build

    - name: Build sdist and wheel
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      # Note: This uses Trusted Publishing by default. No passwords required if configured on PyPI.
      # If you prefer to use your API token instead, uncomment the lines below:
      # with:
      #   password: ${{ secrets.PYPI_API_TOKEN }}
